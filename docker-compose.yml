services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/minpeter/oh-my-openclaw:latest}
    pull_policy: always
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    env_file: .env
    init: true
    shm_size: '2gb'
    volumes:
      - openclaw-data:/root/.openclaw
    restart: unless-stopped

volumes:
  openclaw-data:
